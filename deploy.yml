kind: Deployment
apiVersion: apps/v1
metadata:
  name: mydeploy

spec:
  replicas: 2
  selector:
    matchLabels:
      app: deploy

  template:
    metadata:
      labels:
        app: deploy

    spec:
      containers:
        - name: c1
          image: siva17v/myimg
          ports:
          - containerPort: 8080
